<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nutrition Run</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:#1a1a2e;}

/* ── SCREENS ───────────────────────────────────── */
.screen{
  position:fixed;inset:0;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;
}
.screen.active{display:flex;}

/* ═══ START SCREEN ═══════════════════════════════ */
#startScreen{
  background:
    radial-gradient(ellipse at 20% 20%,rgba(34,197,94,.22) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 80%,rgba(245,158,11,.18) 0%,transparent 55%),
    linear-gradient(160deg,#e8faf0 0%,#d1fae5 50%,#bbf7d0 100%);
}
.start-decor{
  position:absolute;pointer-events:none;opacity:.13;
  animation:floatDecor 5s ease-in-out infinite;filter:blur(.4px);
  font-size:clamp(32px,7vw,56px);
}
.sd1{top:6%;  left:5%;   animation-delay:0s;}
.sd2{top:14%; right:6%;  animation-delay:.7s; font-size:clamp(26px,5.5vw,46px);}
.sd3{top:44%; left:3%;   animation-delay:1.4s;font-size:clamp(24px,5vw,42px);}
.sd4{top:50%; right:4%;  animation-delay:2.1s;font-size:clamp(28px,6.5vw,50px);}
.sd5{bottom:20%;left:7%; animation-delay:.4s; font-size:clamp(26px,5.5vw,44px);}
.sd6{bottom:16%;right:5%;animation-delay:1.1s;font-size:clamp(22px,4.5vw,38px);}
.sd7{top:28%; left:13%;  animation-delay:1.8s;font-size:clamp(18px,3.8vw,32px);}
.sd8{top:32%; right:12%; animation-delay:2.5s;font-size:clamp(20px,4vw,34px);}

.start-inner{
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(12px,2.8vh,20px);
  z-index:1;animation:fadeUp .7s ease both;
  padding:0 clamp(18px,5vw,36px);
  text-align:center;width:100%;max-width:500px;
}
.start-badge{
  background:#22c55e;color:#fff;
  font-size:clamp(10px,2.2vw,13px);font-weight:800;
  letter-spacing:1.8px;text-transform:uppercase;
  padding:6px 20px;border-radius:99px;
  box-shadow:0 2px 12px rgba(34,197,94,.3);
}
.start-title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(54px,13vw,96px);
  color:#14532d;line-height:1.0;
  text-shadow:0 4px 0 rgba(0,0,0,.08);
}
.title-emoji{display:inline-block;animation:bounce 1.6s ease-in-out infinite;}
.start-sub{
  font-size:clamp(14px,3.2vw,17px);
  color:#4b7a5a;max-width:320px;line-height:1.5;
}
.start-btn{
  width:min(280px,78vw);
  padding:clamp(16px,3.8vh,22px) 30px;
  font-family:'Fredoka One',cursive;
  font-size:clamp(22px,5.5vw,28px);
  border-radius:18px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:#fff;box-shadow:0 6px 20px rgba(34,197,94,.45);
  transition:transform .15s,box-shadow .15s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(34,197,94,.55);}
.start-btn:active{transform:scale(.96);}
.start-hint{
  font-size:clamp(11px,2.5vw,13px);
  color:#4b7a5a;opacity:.6;font-style:italic;
}

/* ═══ GAME SCREEN ═══════════════════════════════ */
#gameScreen{background:#1a1a2e;padding:0;justify-content:flex-start;}
#gameCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block;}

#hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:clamp(8px,1.8vh,14px) clamp(10px,2.5vw,18px) 6px;
  background:linear-gradient(to bottom,rgba(0,0,0,.6) 0%,transparent 100%);
  pointer-events:none;z-index:10;
}
#backBtn{
  pointer-events:all;
  font-family:'Fredoka One',cursive;
  font-size:clamp(13px,3.2vw,16px);
  padding:clamp(7px,1.6vh,10px) clamp(13px,3.5vw,20px);
  border:none;border-radius:12px;
  background:#22c55e;color:#fff;
  box-shadow:0 3px 10px rgba(34,197,94,.45);
  cursor:pointer;transition:transform .15s;
}
#backBtn:active{transform:scale(.93);}
#scoreBox{
  font-family:'Fredoka One',cursive;
  font-size:clamp(18px,4.5vw,24px);color:#fff;
  text-shadow:0 2px 6px rgba(0,0,0,.6);
  flex:1;text-align:center;letter-spacing:.5px;
}
#timerBox{
  font-family:'Fredoka One',cursive;
  font-size:clamp(16px,4vw,22px);color:#fde68a;
  text-shadow:0 2px 6px rgba(0,0,0,.6);
  min-width:48px;text-align:right;
}
#heartsBox{
  position:absolute;
  bottom:clamp(10px,2.2vh,20px);
  left:50%;transform:translateX(-50%);
  font-size:clamp(20px,5vw,28px);letter-spacing:3px;
  text-shadow:0 2px 8px rgba(0,0,0,.5);
  pointer-events:none;z-index:10;white-space:nowrap;
}

/* ═══ GAME OVER SCREEN ═══════════════════════════ */
#gameOverScreen{
  background:linear-gradient(160deg,#0f172a 0%,#1e293b 100%);
  padding:clamp(18px,4.5vw,32px) clamp(16px,4.5vw,28px);
  overflow-y:auto;
}
.go-inner{
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(10px,2.2vh,16px);
  animation:fadeUp .5s ease both;
  width:100%;max-width:400px;
  text-align:center;
}
.go-title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(24px,6.5vw,42px);
  color:#f9fafb;line-height:1.2;
}
.go-subtitle{
  font-family:'Fredoka One',cursive;
  font-size:clamp(15px,4.2vw,22px);
  color:#a3e635;line-height:1.3;
}
.go-img{
  width:clamp(85px,20vw,130px);
  height:clamp(85px,20vw,130px);
  object-fit:contain;border-radius:16px;
}
.go-score-box{
  background:rgba(255,255,255,.07);
  border:2px solid rgba(255,255,255,.12);
  border-radius:18px;padding:11px 24px;
  font-family:'Fredoka One',cursive;
  font-size:clamp(15px,3.8vw,19px);color:#e2e8f0;
}
.go-score-box span{
  font-size:clamp(26px,7.5vw,36px);
  color:#22c55e;display:block;
}
.go-btns{
  display:flex;gap:10px;flex-wrap:wrap;
  justify-content:center;width:100%;
}
.go-btn{
  padding:clamp(11px,2.5vh,15px) clamp(18px,5vw,30px);
  font-family:'Fredoka One',cursive;
  font-size:clamp(15px,4vw,19px);
  border:none;border-radius:15px;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
}
.go-btn:active{transform:scale(.95);}
.go-btn-green{
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:#fff;box-shadow:0 5px 16px rgba(34,197,94,.4);
}
.go-btn-green:hover{box-shadow:0 7px 22px rgba(34,197,94,.5);transform:translateY(-2px);}
.go-btn-blue{
  background:linear-gradient(135deg,#1d4ed8,#3b82f6);
  color:#fff;box-shadow:0 5px 16px rgba(59,130,246,.4);
}
.go-btn-blue:hover{box-shadow:0 7px 22px rgba(59,130,246,.5);transform:translateY(-2px);}
.go-btn-gray{
  background:rgba(255,255,255,.12);color:#e2e8f0;
  border:2px solid rgba(255,255,255,.2);
}

/* ═══ QUESTION SCREEN ════════════════════════════ */
#questionScreen{
  background:linear-gradient(160deg,#0f172a 0%,#1e293b 100%);
  padding:clamp(20px,5vw,36px) clamp(16px,5vw,28px);
}
.q-inner{
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(14px,3vh,22px);
  animation:fadeUp .5s ease both;
  width:100%;max-width:440px;
  text-align:center;
}
.q-eyebrow{
  font-size:clamp(11px,2.5vw,13px);font-weight:800;
  letter-spacing:2px;text-transform:uppercase;
  color:#fde68a;background:rgba(253,230,138,.1);
  border:1px solid rgba(253,230,138,.25);
  padding:5px 18px;border-radius:99px;
}
.q-title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(22px,5.5vw,32px);
  color:#fde68a;letter-spacing:.5px;
}
.q-img{
  width:clamp(80px,18vw,115px);
  height:clamp(80px,18vw,115px);
  object-fit:contain;border-radius:16px;
}
.q-card{
  background:rgba(255,255,255,.07);
  border:2px solid rgba(255,255,255,.14);
  border-radius:22px;
  padding:clamp(18px,4.5vw,28px) clamp(16px,4vw,24px);
  width:100%;
}
.q-card-text{
  font-family:'Nunito',sans-serif;
  font-size:clamp(16px,4vw,21px);
  font-weight:800;color:#e2e8f0;
  line-height:1.65;
}
.q-back-btn{
  font-family:'Fredoka One',cursive;
  font-size:clamp(15px,3.8vw,18px);
  padding:clamp(11px,2.4vh,14px) clamp(26px,7vw,44px);
  border:none;border-radius:16px;cursor:pointer;
  background:linear-gradient(135deg,#1d4ed8,#3b82f6);
  color:#fff;box-shadow:0 5px 16px rgba(59,130,246,.4);
  transition:transform .15s,box-shadow .15s;
}
.q-back-btn:hover{transform:translateY(-2px);box-shadow:0 7px 22px rgba(59,130,246,.5);}
.q-back-btn:active{transform:scale(.95);}

/* ── ANIMATIONS ─────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes floatDecor{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-14px) rotate(3deg);}}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
</style>
</head>
<body>

<!-- AUDIO -->
<audio id="bgMusic"    src="assets/music/bg-music.mp3" loop></audio>
<audio id="clickSound" src="assets/music/click.mp3"></audio>
<audio id="biteSound"  src="assets/music/bite.mp3"></audio>

<!-- ═══ START ═══ -->
<div id="startScreen" class="screen active">
  <span class="start-decor sd1">🥗</span>
  <span class="start-decor sd2">🍎</span>
  <span class="start-decor sd3">🥦</span>
  <span class="start-decor sd4">🍔</span>
  <span class="start-decor sd5">🫀</span>
  <span class="start-decor sd6">🥕</span>
  <span class="start-decor sd7">🏃</span>
  <span class="start-decor sd8">🥬</span>
  <div class="start-inner">
    <span class="start-badge">MATATAG Curriculum · Grade School</span>
    <h1 class="start-title"><span class="title-emoji">🏃</span><br>Nutrition<br>Run</h1>
    <p class="start-sub">Dodge junk, collect veggies, survive 60 seconds!</p>
    <button class="start-btn" id="startBtn" onclick="clickSfx();startGame();">▶ Start</button>
    <p class="start-hint">Tilt phone to steer · 🥬 = +1 score · 🍔🪨 = -1 heart</p>
  </div>
</div>

<!-- ═══ GAME ═══ -->
<div id="gameScreen" class="screen">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <button id="backBtn" onclick="clickSfx();goToStart();">◀ Back</button>
    <div id="scoreBox">🥬 0</div>
    <div id="timerBox">60s</div>
  </div>
  <div id="heartsBox">❤️❤️❤️❤️❤️</div>
</div>

<!-- ═══ GAME OVER ═══ -->
<div id="gameOverScreen" class="screen">
  <div class="go-inner">
    <div class="go-title"    id="goTitle">Game Over</div>
    <div class="go-subtitle" id="goSubtitle"></div>
    <img class="go-img" id="goImg" src="" alt="result">
    <div class="go-score-box">Cabbages Eaten <span id="goScore">0</span></div>
    <div class="go-btns" id="goBtns"></div>
  </div>
</div>

<!-- ═══ QUESTION ═══ -->
<div id="questionScreen" class="screen">
  <div class="q-inner">
    <span class="q-eyebrow">Reflect &amp; Think</span>
    <div class="q-title" id="qTitle">Think About It 🤔</div>
    <img class="q-img" id="qImg" src="" alt="">
    <div class="q-card">
      <p class="q-card-text" id="qText"></p>
    </div>
    <button class="q-back-btn" onclick="clickSfx();backFromQuestion();">◀ Back</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  NUTRITION RUN
// ═══════════════════════════════════════════════

/* ── Audio ────────────────────────────────────── */
const bgMusic    = document.getElementById("bgMusic");
const clickAudio = document.getElementById("clickSound");
const biteAudio  = document.getElementById("biteSound");

bgMusic.volume = 0.20; // 40% of default 0.5

function startBgMusic(){
  bgMusic.currentTime = 0;
  bgMusic.play().catch(()=>{});
}
function stopBgMusic(){
  bgMusic.pause();
  bgMusic.currentTime = 0;
}

function clickSfx(){
  try{ const c = clickAudio.cloneNode(); c.volume = 0.65; c.play(); } catch(e){}
}
function biteSfx(){
  try{ const b = biteAudio.cloneNode(); b.volume = 0.85; b.play(); } catch(e){}
}

/* ── Canvas ──────────────────────────────────── */
const canvas  = document.getElementById("gameCanvas");
const ctx     = canvas.getContext("2d");
const scoreEl = document.getElementById("scoreBox");
const timerEl = document.getElementById("timerBox");
const heartsEl= document.getElementById("heartsBox");

/* ── Preload images ──────────────────────────── */
const imgPlayer = new Image(); imgPlayer.src = "assets/images/player.png";
const imgNormal = new Image(); imgNormal.src = "assets/images/normal.png";
const imgSad    = new Image(); imgSad.src    = "assets/images/sad.png";
const imgHappy  = new Image(); imgHappy.src  = "assets/images/happy.png";

/* ── Screen helpers ──────────────────────────── */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goToStart(){
  cancelAnimationFrame(rafId);
  stopTilt();
  stopBgMusic();
  show("startScreen");
}

/* ── Resize ──────────────────────────────────── */
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener("resize", resize);
resize();

/* ── Constants ───────────────────────────────── */
const LANE_COUNT   = 5;
const PLAYER_W     = 0.11;
const PLAYER_SPEED = 0.013;
const BASE_SPEED   = 3.2;
const MAX_SPEED    = 15;
const ITEM_SIZE    = 0.09;
const OBS_W        = 0.12;
const OBS_H        = 0.07;
const SPAWN_MIN    = 38;
const SPAWN_MAX    = 76;
const TOTAL_TIME   = 60;
const MAX_HEARTS   = 5;
const FLASH_FRAMES = 90; // ~1.5s at 60fps

/* ── State ───────────────────────────────────── */
let state, rafId;

function makeState(){
  return {
    running:false, score:0, hearts:MAX_HEARTS,
    timeLeft:TOTAL_TIME, lastSec:performance.now(), speed:BASE_SPEED,
    px:0.5,
    roadY:0,
    items:[], obstacles:[],
    spawnTimer:0, spawnNext:55,
    tiltGamma:0,
    hitFlash:0,
    stripes:[],
  };
}

function initStripes(s){
  s.stripes=[];
  for(let i=0;i<22;i++)
    s.stripes.push({ y:(i/22)*canvas.height, lane:Math.floor(Math.random()*LANE_COUNT) });
}

/* ── Road geometry ───────────────────────────── */
function roadLeft() { return canvas.width*0.08; }
function roadRight(){ return canvas.width*0.92; }
function laneX(lane){
  const rl=roadLeft(), rr=roadRight();
  return rl+(rr-rl)*(lane+0.5)/LANE_COUNT;
}

/* ── Input ───────────────────────────────────── */
let tiltHandler=null;
function startTilt(){
  tiltHandler=e=>{ state.tiltGamma=e.gamma||0; };
  window.addEventListener("deviceorientation",tiltHandler);
}
function stopTilt(){
  if(tiltHandler) window.removeEventListener("deviceorientation",tiltHandler);
  tiltHandler=null;
}
const keys={};
window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",  e=>keys[e.key]=false);

let touchStartX=null;
canvas.addEventListener("touchstart",e=>{ touchStartX=e.touches[0].clientX; },{passive:true});
canvas.addEventListener("touchmove",e=>{
  if(touchStartX===null) return;
  const dx=e.touches[0].clientX-touchStartX;
  if(Math.abs(dx)>6) state.tiltGamma=dx*1.6;
},{passive:true});
canvas.addEventListener("touchend",()=>{ touchStartX=null; state.tiltGamma*=.25; },{passive:true});

/* ── Start ───────────────────────────────────── */
function startGame(){
  resize();
  state=makeState();
  initStripes(state);
  state.running=true;
  scoreEl.textContent="🥬 0";
  timerEl.textContent="60s";
  timerEl.style.color="#fde68a";
  timerEl.style.textShadow="";
  renderHeartsEl();
  show("gameScreen");
  startBgMusic();
  startTilt();
  if(rafId) cancelAnimationFrame(rafId);
  rafId=requestAnimationFrame(loop);
}

/* ── Spawn ───────────────────────────────────── */
function spawnRow(s){
  const cols=shuffle([0,1,2,3,4]).slice(0,1+Math.floor(Math.random()*3));
  cols.forEach(lane=>{
    const roll=Math.random();
    let type;
    if(roll<0.38)       type="cabbage";
    else if(roll<0.62)  type="wind";
    else if(roll<0.80)  type="burger";
    else                type="obstacle";

    if(type==="obstacle"){
      s.obstacles.push({ x:laneX(lane)/canvas.width, y:-0.06, lane });
    } else {
      s.items.push({ type, x:laneX(lane)/canvas.width, y:-0.07 });
    }
  });
}
function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }

/* ── Collision ───────────────────────────────── */
function hit(ax,ay,bx,by,dist){
  const dx=(ax-bx)*canvas.width, dy=(ay-by)*canvas.height;
  return Math.hypot(dx,dy)<dist;
}

/* ── Hearts HUD ──────────────────────────────── */
function renderHeartsEl(){
  heartsEl.textContent=
    "❤️".repeat(state.hearts)+
    "🖤".repeat(Math.max(0,MAX_HEARTS-state.hearts));
}

/* ── Loop ────────────────────────────────────── */
function loop(now){
  if(!state.running) return;
  update(now);
  draw();
  rafId=requestAnimationFrame(loop);
}

function update(now){
  const s=state;

  // Countdown
  if(now-s.lastSec>=1000){
    s.timeLeft=Math.max(0,s.timeLeft-1);
    s.lastSec=now;
    timerEl.textContent=s.timeLeft+"s";
    if(s.timeLeft<=0){ endGame("timer"); return; }
  }

  // Speed ramp
  const elapsed=TOTAL_TIME-s.timeLeft;
  s.speed=BASE_SPEED+(MAX_SPEED-BASE_SPEED)*(elapsed/TOTAL_TIME);
  const spd=s.speed/canvas.height;

  // Player movement
  let move=0;
  if(Math.abs(s.tiltGamma)>2) move=s.tiltGamma*0.00046;
  if(keys["ArrowLeft"] ||keys["a"]) move=-PLAYER_SPEED;
  if(keys["ArrowRight"]||keys["d"]) move= PLAYER_SPEED;
  const half=PLAYER_W*0.5;
  s.px=Math.max(roadLeft()/canvas.width+half,
       Math.min(roadRight()/canvas.width-half, s.px+move));

  // Road scroll & stripe scroll
  s.roadY=(s.roadY+s.speed)%canvas.height;
  for(let i=0;i<s.stripes.length;i++){
    s.stripes[i].y+=s.speed;
    if(s.stripes[i].y>canvas.height+30){
      s.stripes[i].y=-30;
      s.stripes[i].lane=Math.floor(Math.random()*LANE_COUNT);
    }
  }

  // Spawn
  s.spawnTimer++;
  if(s.spawnTimer>=s.spawnNext){
    spawnRow(s); s.spawnTimer=0;
    s.spawnNext=SPAWN_MIN+Math.floor(Math.random()*(SPAWN_MAX-SPAWN_MIN));
  }

  const playerY=0.72;
  const hitDist=canvas.width*ITEM_SIZE*0.52;
  const obsDist=canvas.width*OBS_W*0.42;

  // Items: move and collect
  for(let i=s.items.length-1;i>=0;i--){
    const it=s.items[i];
    it.y+=spd;
    if(it.y>1.12){ s.items.splice(i,1); continue; }

    if(hit(s.px,playerY,it.x,it.y,hitDist)){
      const t=it.type;
      s.items.splice(i,1);
      biteSfx();
      if(t==="cabbage"){
        s.score++;
        if(s.hearts<MAX_HEARTS) s.hearts++;
        renderHeartsEl();
        scoreEl.textContent="🥬 "+s.score;
      } else if(t==="wind"){
        s.score=Math.max(0,s.score-1);
        scoreEl.textContent="🥬 "+s.score;
      } else if(t==="burger"){
        s.score=Math.max(0,s.score-1);
        scoreEl.textContent="🥬 "+s.score;
        s.hearts--;
        renderHeartsEl();
        if(s.hearts<=0){ endGame("hearts"); return; }
      }
    }
  }

  // Obstacles: move, collide
  for(let i=s.obstacles.length-1;i>=0;i--){
    s.obstacles[i].y+=spd;
    if(s.obstacles[i].y>1.12){ s.obstacles.splice(i,1); continue; }
    if(hit(s.px,playerY,s.obstacles[i].x,s.obstacles[i].y,obsDist)){
      s.obstacles.splice(i,1);
      s.hearts--;
      s.hitFlash=FLASH_FRAMES;
      renderHeartsEl();
      if(s.hearts<=0){ endGame("hearts"); return; }
    }
  }

  // Decay flash
  if(s.hitFlash>0) s.hitFlash--;
}

/* ── Draw ────────────────────────────────────── */
function draw(){
  const s=state;
  const W=canvas.width, H=canvas.height;
  const RL=roadLeft(), RR=roadRight(), RW=RR-RL;
  const playerY=0.72;
  const iSize=W*ITEM_SIZE;
  const pSize=W*PLAYER_W*1.15;

  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,"#0f172a"); sky.addColorStop(1,"#1e3a1e");
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Grass
  ctx.fillStyle="#14532d";
  ctx.fillRect(0,0,RL,H);
  ctx.fillRect(RR,0,W-RR,H);

  // Grass texture
  ctx.strokeStyle="rgba(34,197,94,0.14)"; ctx.lineWidth=2;
  const offY=(s.roadY*0.4)%60;
  for(let i=0;i<10;i++){
    const lx=(i/10)*RL, rx=RR+(i/10)*(W-RR);
    for(let j=-1;j<H/60+1;j++){
      ctx.beginPath();ctx.moveTo(lx,j*60+offY);ctx.lineTo(lx+9,j*60+offY+26);ctx.stroke();
      ctx.beginPath();ctx.moveTo(rx,j*60+offY);ctx.lineTo(rx-9,j*60+offY+26);ctx.stroke();
    }
  }

  // Road
  const rg=ctx.createLinearGradient(RL,0,RR,0);
  rg.addColorStop(0,"#374151"); rg.addColorStop(.5,"#4b5563"); rg.addColorStop(1,"#374151");
  ctx.fillStyle=rg; ctx.fillRect(RL,0,RW,H);

  // Ground patches
  ctx.fillStyle="rgba(255,255,255,0.020)";
  for(let i=0;i<s.stripes.length;i++){
    const sx=laneX(s.stripes[i].lane);
    ctx.beginPath(); ctx.ellipse(sx,s.stripes[i].y,RW*0.063,8,0,0,Math.PI*2); ctx.fill();
  }

  // Lane dashes
  ctx.strokeStyle="rgba(250,204,21,0.48)"; ctx.lineWidth=3;
  ctx.setLineDash([28,26]);
  for(let l=1;l<LANE_COUNT;l++){
    const lx=RL+(l/LANE_COUNT)*RW;
    ctx.beginPath(); ctx.lineDashOffset=-s.roadY;
    ctx.moveTo(lx,0); ctx.lineTo(lx,H); ctx.stroke();
  }
  ctx.setLineDash([]);

  // Road edges
  ctx.strokeStyle="#22c55e"; ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(RL,0);ctx.lineTo(RL,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(RR,0);ctx.lineTo(RR,H);ctx.stroke();

  // Hit flash overlay
  if(s.hitFlash>0){
    ctx.fillStyle=`rgba(239,68,68,${(s.hitFlash/FLASH_FRAMES)*0.28})`;
    ctx.fillRect(0,0,W,H);
  }

  // Obstacles
  s.obstacles.forEach(o=>{
    const ox=o.x*W, oy=o.y*H;
    const ow=W*OBS_W, oh=H*OBS_H*0.66;
    ctx.fillStyle="#7f1d1d";
    ctx.beginPath(); roundRect(ctx,ox-ow/2,oy-oh/2,ow,oh,10); ctx.fill();
    ctx.shadowColor="rgba(0,0,0,0.5)"; ctx.shadowBlur=8;
    ctx.font=`${oh*0.8}px serif`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("🪨",ox,oy);
    ctx.shadowBlur=0;
  });

  // Items
  s.items.forEach(it=>{
    const emoji=it.type==="cabbage"?"🥬":it.type==="wind"?"💨":"🍔";
    ctx.font=`${iSize}px serif`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.shadowColor=it.type==="cabbage"?"#22c55e":it.type==="burger"?"#ef4444":"#60a5fa";
    ctx.shadowBlur=14;
    ctx.fillText(emoji,it.x*W,it.y*H);
    ctx.shadowBlur=0;
  });

  // Player ground shadow (ellipse beneath feet)
  const shadowGrad = ctx.createRadialGradient(
    s.px*W, playerY*H+pSize*0.44, 0,
    s.px*W, playerY*H+pSize*0.44, pSize*0.38
  );
  shadowGrad.addColorStop(0,"rgba(0,0,0,0.45)");
  shadowGrad.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=shadowGrad;
  ctx.beginPath();
  ctx.ellipse(s.px*W, playerY*H+pSize*0.44, pSize*0.38, pSize*0.12, 0, 0, Math.PI*2);
  ctx.fill();

  // Player image (fallback emoji)
  if(imgPlayer.complete && imgPlayer.naturalWidth>0){
    // subtle green glow behind the character
    ctx.shadowColor="rgba(34,197,94,0.55)";
    ctx.shadowBlur=22;
    ctx.drawImage(imgPlayer, s.px*W-pSize/2, playerY*H-pSize/2, pSize, pSize);
    ctx.shadowBlur=0;
  } else {
    ctx.font=`${pSize}px serif`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.shadowColor="rgba(34,197,94,0.6)"; ctx.shadowBlur=18;
    ctx.fillText("🏃",s.px*W,playerY*H);
    ctx.shadowBlur=0;
  }

  // Timer colour
  if(s.timeLeft<=10){
    timerEl.style.color="#ef4444";
    timerEl.style.textShadow="0 0 12px #ef4444";
  } else if(s.timeLeft<=20){
    timerEl.style.color="#f97316";
    timerEl.style.textShadow="0 0 8px #f97316";
  } else {
    timerEl.style.color="#fde68a";
    timerEl.style.textShadow="";
  }
}

/* ── Round rect helper ───────────────────────── */
function roundRect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

/* ── Question data ───────────────────────────── */
const questionData = {
  obese:       { q:"Why is it unhealthy to have a higher body mass?",             img:imgSad    },
  malnourished:{ q:"Does eating really low amounts endanger you? Why so?",        img:imgSad    },
  normal:      { q:"Is having just a normal body count as a good thing? Why so?", img:imgNormal },
  fit:         { q:"What should a person do to be as healthy as you?",            img:imgHappy  },
};
let currentResultType=null;

/* ── End game ────────────────────────────────── */
function endGame(reason){
  state.running=false;
  cancelAnimationFrame(rafId);
  stopTilt();
  stopBgMusic();

  const sc=state.score;
  document.getElementById("goScore").textContent=sc;
  const goBtns=document.getElementById("goBtns");
  goBtns.innerHTML="";

  if(reason==="hearts"){
    currentResultType="obese";
    document.getElementById("goTitle").textContent="Game Over!";
    document.getElementById("goSubtitle").textContent="Your Player is Obese, Can't Run Anymore";
    document.getElementById("goImg").src=imgSad.src;
  } else {
    if(sc>=1&&sc<=5){
      currentResultType="malnourished";
      document.getElementById("goTitle").textContent="Time's Up!";
      document.getElementById("goSubtitle").textContent="Eat More Next Time";
      document.getElementById("goImg").src=imgSad.src;
    } else if(sc>=6&&sc<=15){
      currentResultType="normal";
      document.getElementById("goTitle").textContent="Time's Up!";
      document.getElementById("goSubtitle").textContent="Good Job! 👍";
      document.getElementById("goImg").src=imgNormal.src;
    } else if(sc>=16){
      currentResultType="fit";
      document.getElementById("goTitle").textContent="Time's Up!";
      document.getElementById("goSubtitle").textContent="You are Winning in Life! 🌟";
      document.getElementById("goImg").src=imgHappy.src;
    } else {
      currentResultType="malnourished";
      document.getElementById("goTitle").textContent="Time's Up!";
      document.getElementById("goSubtitle").textContent="Try Collecting Cabbages Next Time!";
      document.getElementById("goImg").src=imgSad.src;
    }
  }

  // Buttons
  const btnPlay=document.createElement("button");
  btnPlay.className="go-btn go-btn-green";
  btnPlay.innerHTML="▶ Play Again";
  btnPlay.onclick=()=>{ clickSfx(); startGame(); };

  const btnQ=document.createElement("button");
  btnQ.className="go-btn go-btn-blue";
  btnQ.innerHTML="❓ Question";
  btnQ.onclick=()=>{ clickSfx(); openQuestion(); };

  const btnLeave=document.createElement("button");
  btnLeave.className="go-btn go-btn-gray";
  btnLeave.innerHTML="🏠 Leave";
  btnLeave.onclick=()=>{ clickSfx(); goToStart(); };

  goBtns.appendChild(btnPlay);
  goBtns.appendChild(btnQ);
  goBtns.appendChild(btnLeave);

  show("gameOverScreen");
}

/* ── Question screen ─────────────────────────── */
function openQuestion(){
  const data=questionData[currentResultType];
  if(!data) return;
  document.getElementById("qImg").src=data.img.src;
  document.getElementById("qText").textContent=data.q;
  show("questionScreen");
}
function backFromQuestion(){
  show("gameOverScreen");
}

/* ── iOS tilt permission ─────────────────────── */
document.getElementById("startBtn").addEventListener("click",()=>{
  if(typeof DeviceOrientationEvent!=="undefined" &&
     typeof DeviceOrientationEvent.requestPermission==="function"){
    DeviceOrientationEvent.requestPermission()
      .then(r=>{ if(r==="granted") startTilt(); })
      .catch(()=>{});
  }
},{once:true});
</script>
